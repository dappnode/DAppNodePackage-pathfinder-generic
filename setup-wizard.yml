version: "2"
fields:
  # Campo obligatorio para la URL de Ethereum
  - id: ethereumApiUrl
    target:
      type: environment
      name: PATHFINDER_ETHEREUM_API_URL
      service: pathfinder
    title: Ethereum API URL
    description: >-
      **Required**: URL of your Ethereum Sepolia node for L1 state verification.


      **Examples:**

      - `ws://execution.sepolia.dncore.dappnode:8555` (DappNode Sepolia execution client)

      - `wss://sepolia.infura.io/ws/v3/YOUR-PROJECT-ID` (Infura WebSocket)

      - `https://sepolia.infura.io/v3/YOUR-PROJECT-ID` (Infura HTTP)


      **Note:** WebSocket (ws:// or wss://) URLs are recommended for better performance.
    required: true
    pattern: "^(https?|wss?)://.*"
    patternErrorMessage: Must be a valid HTTP or WebSocket URL (http://, https://, ws://, or wss://)

  # Campo para seleccionar el nivel de logging
  - id: logLevel
    target:
      type: environment
      name: RUST_LOG
      service: pathfinder
    title: Log Level
    description: >-
      Select the logging verbosity level for Pathfinder.


      - **error**: Only error messages

      - **warn**: Warnings and errors

      - **info**: General information (recommended)

      - **debug**: Detailed debugging information

      - **trace**: Very verbose debugging (use only for troubleshooting)
    enum:
      - error
      - warn
      - info
      - debug
      - trace
    required: false